<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM batch caller</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #617080;
      --border: #d7dde4;
      --accent: #1769e0;
      --accent-dark: #1153b3;
      --error: #b42318;
      --success: #13795b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100% - 32px, 720px);
      margin: 0 auto;
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 2rem;
      line-height: 1.15;
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(31, 41, 51, 0.06);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 22px;
    }

    label {
      font-weight: 650;
    }

    textarea,
    input[type="text"],
    input[type="password"],
    input[type="file"] {
      width: 100%;
      font: inherit;
    }

    textarea,
    input[type="text"],
    input[type="password"] {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 12px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    textarea:focus,
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(23, 105, 224, 0.15);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    #downloadButton {
      display: none;
      background: var(--success);
    }

    #csvLink {
      display: none;
      color: var(--accent);
      font-weight: 700;
    }

    #status {
      margin: 24px 0 0;
      min-height: 24px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    #status.error {
      color: var(--error);
    }

    #status.success {
      color: var(--success);
    }

    .results {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }

    .result {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .result-header {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .result-section {
      margin-top: 10px;
    }

    .result-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-text {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>LLM batch caller</h1>

    <section class="panel" aria-label="Batch caller controls">
      <div class="field">
        <label for="systemPrompt">System prompt</label>
        <textarea id="systemPrompt" placeholder="Paste the system prompt here"></textarea>
      </div>

      <div class="field">
        <label for="promptFile">Prompt or image file</label>
        <input id="promptFile" type="file" accept=".txt,.csv,.jpg,.jpeg,.png,text/plain,text/csv,image/jpeg,image/png">
      </div>

      <div class="field">
        <label for="apiUrl">API URL</label>
        <input id="apiUrl" type="text" value="http://localhost:1234/v1/chat/completions">
      </div>

      <div class="field">
        <label for="apiKey">API Key</label>
        <input id="apiKey" type="password" value="">
      </div>

      <div class="field">
        <label for="modelName">Model name</label>
        <input id="modelName" type="text" value="qwen3.5-0.8b-mlx" placeholder="qwen3.5-0.8b (LM Studio), gemini-2.5-flash (Google AI Studio), meta-llama/llama-3.3-70b-instruct:free (OpenRouter)">
      </div>

      <div class="actions">
        <button id="runButton" type="button">Run</button>
        <button id="downloadButton" type="button">Download CSV</button>
        <a id="csvLink" download="results.csv">Open CSV link</a>
      </div>

      <div id="status" role="status" aria-live="polite"></div>
    </section>

    <section id="results" class="results" aria-label="Results"></section>
  </main>

  <script>
    if (location.protocol === "file:") {
      location.replace("http://127.0.0.1:8000/index.html");
    }

    const systemPromptInput = document.getElementById("systemPrompt");
    const promptFileInput = document.getElementById("promptFile");
    const apiUrlInput = document.getElementById("apiUrl");
    const apiKeyInput = document.getElementById("apiKey");
    const modelNameInput = document.getElementById("modelName");
    const runButton = document.getElementById("runButton");
    const downloadButton = document.getElementById("downloadButton");
    const csvLink = document.getElementById("csvLink");
    const statusArea = document.getElementById("status");
    const resultsArea = document.getElementById("results");

    let results = [];
    const IMAGE_EXTRACTION_PROMPT = "Extract all readable text from this image. Preserve line breaks where helpful and return only the extracted text.";

    runButton.addEventListener("click", runBatch);
    downloadButton.addEventListener("click", downloadCsv);

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Could not read the selected file."));
        reader.readAsText(file);
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Could not read the selected image."));
        reader.readAsDataURL(file);
      });
    }

    function isImageFile(file) {
      return file.type.startsWith("image/") || /\.(jpe?g|png)$/i.test(file.name);
    }

    function splitPromptLines(text) {
      return text
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n")
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
    }

    async function runBatch() {
      const file = promptFileInput.files[0];
      const apiUrl = apiUrlInput.value.trim();
      const apiKey = apiKeyInput.value.trim();
      const model = modelNameInput.value.trim();

      clearStatus();
      results = [];
      resultsArea.innerHTML = "";
      downloadButton.style.display = "none";
      csvLink.style.display = "none";
      csvLink.removeAttribute("href");

      if (!file) {
        setStatus("Choose a .txt, .csv, .jpg, .jpeg, or .png file first.", "error");
        return;
      }

      if (!model) {
        setStatus("Enter a model name before running.", "error");
        return;
      }

      if (!apiUrl) {
        setStatus("Enter an API URL before running.", "error");
        return;
      }

      runButton.disabled = true;
      promptFileInput.disabled = true;
      apiUrlInput.disabled = true;
      apiKeyInput.disabled = true;
      modelNameInput.disabled = true;
      systemPromptInput.disabled = true;

      try {
        if (isImageFile(file)) {
          setStatus(`Extracting text from ${file.name}...`);
          const imageDataUrl = await readFileAsDataUrl(file);
          const response = await callChatCompletion(
            apiUrl,
            apiKey,
            model,
            systemPromptInput.value,
            IMAGE_EXTRACTION_PROMPT,
            imageDataUrl
          );
          const result = { row_number: 1, input: file.name, response };

          results.push(result);
          appendResult(result);
          setStatus("Done. Extracted text from 1 image.", "success");
          downloadButton.style.display = "inline-block";
          return;
        }

        const fileText = await readFileAsText(file);
        const prompts = splitPromptLines(fileText);

        if (prompts.length === 0) {
          setStatus("The selected file does not contain any prompt lines.", "error");
          return;
        }

        for (let index = 0; index < prompts.length; index += 1) {
          const rowNumber = index + 1;
          const input = prompts[index];
          setStatus(`Processing ${rowNumber} of ${prompts.length}...`);

          const response = await callChatCompletion(apiUrl, apiKey, model, systemPromptInput.value, input);
          const result = { row_number: rowNumber, input, response };
          results.push(result);
          appendResult(result);
        }

        setStatus(`Done. Processed ${prompts.length} prompt${prompts.length === 1 ? "" : "s"}.`, "success");
        downloadButton.style.display = "inline-block";
      } catch (error) {
        setStatus(error.message || String(error), "error");
      } finally {
        runButton.disabled = false;
        promptFileInput.disabled = false;
        apiUrlInput.disabled = false;
        apiKeyInput.disabled = false;
        modelNameInput.disabled = false;
        systemPromptInput.disabled = false;
      }
    }

    async function callChatCompletion(apiUrl, apiKey, model, systemPrompt, userPrompt, imageDataUrl) {
      try {
        const headers = {
          "Content-Type": "application/json"
        };

        if (apiKey) {
          headers.Authorization = `Bearer ${apiKey}`;
        }

        const response = await fetch("/proxy-chat-completions", {
          method: "POST",
          headers: {
            ...headers,
            "X-API-URL": apiUrl
          },
          body: JSON.stringify({
            model,
            messages: [
              { role: "system", content: systemPrompt },
              {
                role: "user",
                content: imageDataUrl
                  ? [
                      { type: "text", text: userPrompt },
                      { type: "image_url", image_url: { url: imageDataUrl } }
                    ]
                  : userPrompt
              }
            ]
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText || response.statusText}`);
        }

        const data = await response.json();
        return data.choices?.[0]?.message?.content ?? "";
      } catch (error) {
        if (error instanceof TypeError && error.message === "Failed to fetch") {
          return [
            "Error: Failed to fetch.",
            "The browser could not connect to LM Studio from this page.",
            "Make sure server.py and the LM Studio server are both running, then open http://127.0.0.1:8000/index.html."
          ].join(" ");
        }

        return `Error: ${error.message || String(error)}`;
      }
    }

    function appendResult(result) {
      const card = document.createElement("article");
      card.className = "result";

      const header = document.createElement("div");
      header.className = "result-header";
      header.textContent = `Row ${result.row_number}`;

      const inputSection = createResultSection("Input", result.input);
      const responseSection = createResultSection("Response", result.response);

      card.append(header, inputSection, responseSection);
      resultsArea.appendChild(card);
    }

    function createResultSection(label, text) {
      const section = document.createElement("div");
      section.className = "result-section";

      const sectionLabel = document.createElement("div");
      sectionLabel.className = "result-label";
      sectionLabel.textContent = label;

      const sectionText = document.createElement("p");
      sectionText.className = "result-text";
      sectionText.textContent = text;

      section.append(sectionLabel, sectionText);
      return section;
    }

    async function downloadCsv() {
      if (results.length === 0) {
        setStatus("There are no results to download yet.", "error");
        return;
      }

      downloadButton.disabled = true;

      const header = ["row_number", "input", "response"];
      const rows = results.map((result) => [
        result.row_number,
        result.input,
        result.response
      ]);
      const csv = [header, ...rows]
        .map((row) => row.map(escapeCsvField).join(","))
        .join("\r\n");

      try {
        const response = await fetch("/save-csv", {
          method: "POST",
          headers: {
            "Content-Type": "text/csv;charset=utf-8"
          },
          body: "\uFEFF" + csv
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || `HTTP ${response.status}`);
        }

        const data = await response.json();
        const downloadUrl = `/download-csv?id=${encodeURIComponent(data.id)}`;
        const link = document.createElement("a");

        link.href = downloadUrl;
        link.download = "results.csv";
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        link.remove();

        csvLink.href = downloadUrl;
        csvLink.style.display = "inline-block";
        setStatus("CSV is ready. If the download did not start, use the Open CSV link.", "success");
      } catch (error) {
        setStatus(`CSV download failed: ${error.message || String(error)}`, "error");
      } finally {
        downloadButton.disabled = false;
      }
    }

    function escapeCsvField(value) {
      const field = String(value ?? "");
      if (/[",\r\n]/.test(field)) {
        return `"${field.replace(/"/g, '""')}"`;
      }
      return field;
    }

    function setStatus(message, type) {
      statusArea.textContent = message;
      statusArea.className = type || "";
    }

    function clearStatus() {
      setStatus("");
    }
  </script>
</body>
</html>
